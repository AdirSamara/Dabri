name: Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npx jest --coverage --ci --reporters=default --reporters=github-actions

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  e2e-tests:
    name: E2E Tests (API 34)
    runs-on: ubuntu-latest
    needs: unit-tests
    # Only run E2E on PRs, skip on [skip-e2e] in commit message
    if: |
      github.event_name == 'pull_request' &&
      !contains(github.event.head_commit.message, '[skip-e2e]')
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android/**/*.gradle*', 'android/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Build debug APK
        run: cd android && chmod +x gradlew && ./gradlew assembleDebug --no-daemon -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=512m"
        timeout-minutes: 15

      - name: Install Maestro
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      - name: Run E2E on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_7
          force-avd-creation: false
          emulator-options: -no-window -no-audio -gpu swiftshader_indirect -no-snapshot
          disable-animations: true
          script: |
            adb install android/app/build/outputs/apk/debug/app-debug.apk
            maestro test e2e/maestro/flows/ --format junit --output e2e-results.xml || true

      - name: Upload E2E results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-results
          path: e2e-results.xml
          retention-days: 7

  # Full matrix — runs on main merge or manual trigger only
  e2e-matrix:
    name: E2E Matrix (API ${{ matrix.api-level }})
    runs-on: ubuntu-latest
    needs: unit-tests
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    strategy:
      fail-fast: false
      matrix:
        api-level: [30, 33, 34, 35]
        include:
          - api-level: 30
            target: google_apis
            profile: pixel_4
          - api-level: 33
            target: google_apis
            profile: pixel_6
          - api-level: 34
            target: google_apis
            profile: pixel_7
          - api-level: 35
            target: google_apis
            profile: pixel_8
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android/**/*.gradle*') }}
          restore-keys: gradle-

      - name: Build debug APK
        run: cd android && chmod +x gradlew && ./gradlew assembleDebug --no-daemon -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=512m"
        timeout-minutes: 15

      - name: Install Maestro
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      - name: Run E2E flows
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          target: ${{ matrix.target }}
          arch: x86_64
          profile: ${{ matrix.profile }}
          force-avd-creation: false
          emulator-options: -no-window -no-audio -gpu swiftshader_indirect -no-snapshot
          disable-animations: true
          script: |
            adb install android/app/build/outputs/apk/debug/app-debug.apk

            # Core flows
            maestro test e2e/maestro/flows/ || true

            # API-specific flows
            API=${{ matrix.api-level }}
            [ "$API" -ge 33 ] && maestro test e2e/maestro/flows-api33/ || true
            [ "$API" -ge 34 ] && maestro test e2e/maestro/flows-api34/ || true
            [ "$API" -ge 35 ] && maestro test e2e/maestro/flows-api35/ || true
            [ "$API" -ge 36 ] && maestro test e2e/maestro/flows-api36/ || true
